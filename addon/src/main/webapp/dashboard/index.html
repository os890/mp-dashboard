<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroProfile Dashboard</title>
<style>
:root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --fg: #e2e8f0; --fg2: #94a3b8; --accent: #38bdf8;
    --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
    --border: #475569; --radius: 8px;
}
.light {
    --bg: #f8fafc; --bg2: #ffffff; --bg3: #e2e8f0;
    --fg: #1e293b; --fg2: #64748b; --accent: #0284c7;
    --green: #16a34a; --red: #dc2626; --yellow: #ca8a04;
    --border: #cbd5e1;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--fg);
    min-height: 100vh; transition: background 0.3s, color 0.3s;
}
header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 20px; font-weight: 600; }
header h1 span { color: var(--accent); }
.controls { display: flex; gap: 12px; align-items: center; }
.btn {
    background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: var(--radius); cursor: pointer;
    font-size: 13px; transition: background 0.2s;
}
.btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.section-title {
    font-size: 16px; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 12px;
}
.section-title span { color: var(--accent); }
.cat-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.cat-tab {
    background: var(--bg3); color: var(--fg2); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 20px; cursor: pointer;
    font-size: 12px; transition: all 0.2s;
}
.cat-tab:hover { color: var(--fg); border-color: var(--accent); }
.cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.cat-tab .count {
    display: inline-block; background: var(--bg); padding: 1px 6px;
    border-radius: 10px; font-size: 11px; margin-left: 4px;
}
.cat-tab.active .count { background: rgba(255,255,255,0.2); }
.health-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media (max-width: 900px) { .health-grid { grid-template-columns: 1fr; } }
.card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; transition: background 0.3s;
}
.card h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--fg2); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
}
.card h2 .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    text-transform: none; letter-spacing: 0;
}
.badge-up { background: var(--green); color: #000; }
.badge-down { background: var(--red); color: #fff; }
.badge-mixed { background: var(--yellow); color: #000; }
.check {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
}
.check:last-child { border-bottom: none; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot.up { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.down { background: var(--red); box-shadow: 0 0 6px var(--red); }
.dot.unknown { background: var(--yellow); }
.check-name { font-size: 14px; flex: 1; }
.check-cat {
    font-size: 11px; color: var(--fg2); background: var(--bg3);
    padding: 2px 8px; border-radius: 10px;
}
.check-status { font-size: 12px; color: var(--fg2); margin-left: 8px; }
.check-data { font-size: 11px; color: var(--fg2); margin-left: 26px; padding: 2px 0; }
.empty { color: var(--fg2); font-size: 13px; font-style: italic; padding: 8px 0; }
.full-width { grid-column: 1 / -1; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
    text-align: left; padding: 8px 12px; background: var(--bg3);
    color: var(--fg2); font-weight: 600; border-bottom: 2px solid var(--border);
    position: sticky; top: 0;
}
td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--bg3); }
.config-key { font-family: 'Fira Code', monospace; font-size: 12px; color: var(--accent); }
.config-val { font-family: 'Fira Code', monospace; font-size: 12px; word-break: break-all; }
.config-filter {
    width: 100%; padding: 8px 12px; margin-bottom: 12px;
    background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 13px; outline: none;
}
.config-filter::placeholder { color: var(--fg2); }
.config-scroll {
    max-height: 500px; overflow-y: auto;
    border: 1px solid var(--border); border-radius: var(--radius);
}
.config-scroll::-webkit-scrollbar { width: 8px; }
.config-scroll::-webkit-scrollbar-track { background: var(--bg3); border-radius: var(--radius); }
.config-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius); }
.config-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }
.config-count { font-size: 12px; color: var(--fg2); margin-bottom: 8px; }
.metric { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
.metric:last-child { border-bottom: none; }
.metric-label { font-size: 13px; color: var(--fg2); }
.metric-value { font-size: 13px; font-weight: 600; font-family: 'Fira Code', monospace; }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.spark-container {
    width: 100%; height: 120px; display: flex; align-items: flex-end; gap: 1px;
    border-bottom: 1px solid var(--border); margin-bottom: 8px;
}
.spark-bar {
    flex: 1; min-width: 1px; background: var(--accent); border-radius: 2px 2px 0 0;
    transition: height 0.3s; opacity: 0.7;
}
.spark-bar:last-child { opacity: 1; }
.spark-bar.warn { background: var(--yellow); }
.spark-bar.crit { background: var(--red); }
.spark-label { font-size: 12px; color: var(--fg2); display: flex; justify-content: space-between; }
.timestamp { font-size: 11px; color: var(--fg2); }
.loading { color: var(--fg2); font-size: 13px; }
</style>
</head>
<body>
<header>
    <h1><span>MP</span> Dashboard</h1>
    <div class="controls">
        <span class="timestamp" id="ts"></span>
        <button class="btn" onclick="refresh()">Refresh</button>
        <button class="btn" onclick="toggleTheme()">Light/Dark</button>
    </div>
</header>
<div class="container">
    <div class="section-title"><span>Health</span> Checks</div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="health-grid" id="health-grid">
        <div class="card full-width"><div class="loading">Loading...</div></div>
    </div>
    <div class="section-title"><span>JVM</span> Metrics</div>
    <div class="health-grid" id="metrics-grid">
        <div class="card"><div class="loading">Loading...</div></div>
    </div>
    <div class="section-title"><span>Metrics</span> History <span style="font-size:12px;color:var(--fg2);font-weight:400">(last 30 min, updated every 10s)</span></div>
    <div class="health-grid">
        <div class="card"><h2>CPU Load %</h2><div class="spark-container" id="chart-cpu"></div><div class="spark-label" id="label-cpu"></div></div>
        <div class="card"><h2>Heap Memory MB</h2><div class="spark-container" id="chart-heap"></div><div class="spark-label" id="label-heap"></div></div>
        <div class="card"><h2>Threads</h2><div class="spark-container" id="chart-threads"></div><div class="spark-label" id="label-threads"></div></div>
    </div>
    <div class="card full-width">
        <h2>MicroProfile Config</h2>
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px">
            <input type="text" class="config-filter" id="filter" placeholder="Filter properties..." oninput="filterConfig()" style="margin-bottom:0;flex:1">
            <label style="font-size:12px;color:var(--fg2);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:4px">
                <input type="checkbox" id="show-all" onchange="filterConfig()"> Show all properties
            </label>
        </div>
        <div class="config-count" id="config-count"></div>
        <div class="config-scroll">
            <table>
                <thead><tr><th>Property</th><th>Value</th></tr></thead>
                <tbody id="config-body"><tr><td colspan="2" class="loading">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>
<script>
var configData = [];
var healthChecks = [];
var activeCategory = 'Server';
var basePath = window.location.pathname.replace(/\/dashboard(\/.*)?$/, '');

function apiUrl(path) { return basePath + '/dashboard/api/' + path; }

function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function getCategories() {
    var cats = {};
    healthChecks.forEach(function(c) { cats[c.category || 'General'] = true; });
    var rest = Object.keys(cats).filter(function(c) { return c !== 'Server'; }).sort();
    var result = ['All'];
    if (cats['Server']) result.push('Server');
    return result.concat(rest);
}

function getFiltered() {
    if (activeCategory === 'All') return healthChecks;
    return healthChecks.filter(function(c) { return (c.category || 'General') === activeCategory; });
}

function renderCategoryTabs() {
    var cats = getCategories();
    document.getElementById('cat-tabs').innerHTML = cats.map(function(cat) {
        var count = cat === 'All' ? healthChecks.length :
            healthChecks.filter(function(c) { return (c.category || 'General') === cat; }).length;
        var cls = cat === activeCategory ? 'cat-tab active' : 'cat-tab';
        return '<span class="' + cls + '" onclick="setCategory(\'' + esc(cat) + '\')">' +
               esc(cat) + '<span class="count">' + count + '</span></span>';
    }).join('');
}

function setCategory(cat) {
    activeCategory = cat;
    renderCategoryTabs();
    renderHealth();
}

function renderHealth() {
    var grid = document.getElementById('health-grid');
    var checks = getFiltered();

    if (checks.length === 0) {
        grid.innerHTML = '<div class="card full-width"><div class="empty">No health checks available</div></div>';
        return;
    }

    // group by category
    var groups = {};
    checks.forEach(function(c) {
        var cat = c.category || 'General';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(c);
    });

    var html = '';
    var catNames = Object.keys(groups).sort(function(a, b) {
        if (a === 'Server') return -1;
        if (b === 'Server') return 1;
        return a.localeCompare(b);
    });
    catNames.forEach(function(cat) {
        var items = groups[cat];
        var allUp = items.every(function(c) { return c.status === 'UP'; });
        var anyDown = items.some(function(c) { return c.status === 'DOWN'; });
        var badgeCls = allUp ? 'badge-up' : (anyDown ? 'badge-down' : 'badge-mixed');
        var badgeText = allUp ? 'ALL UP' : (anyDown ? 'ISSUES' : 'MIXED');

        html += '<div class="card"><h2>' + esc(cat) +
            ' <span class="badge ' + badgeCls + '">' + badgeText + '</span></h2>';

        items.forEach(function(c) {
            var dot = c.status === 'UP' ? 'up' : (c.status === 'DOWN' ? 'down' : 'unknown');
            var dataKeys = Object.keys(c).filter(function(k) {
                return k !== 'name' && k !== 'status' && k !== 'category';
            });
            html += '<div class="check"><span class="dot ' + dot + '"></span>' +
                    '<span class="check-name">' + esc(c.name) + '</span>' +
                    '<span class="check-status">' + c.status + '</span></div>';
            dataKeys.forEach(function(k) {
                html += '<div class="check-data">' + esc(k) + ': ' + esc(String(c[k])) + '</div>';
            });
        });
        html += '</div>';
    });

    grid.innerHTML = html;
}

function renderConfig(entries) {
    configData = entries || [];
    filterConfig();
}

function filterConfig() {
    var q = document.getElementById('filter').value.toLowerCase();
    var showAll = document.getElementById('show-all').checked;
    var tbody = document.getElementById('config-body');
    var countEl = document.getElementById('config-count');
    var filtered = configData.filter(function(e) {
        if (!showAll && !e.matched) return false;
        return e.key.toLowerCase().indexOf(q) >= 0 || e.value.toLowerCase().indexOf(q) >= 0;
    });
    var otherCount = configData.filter(function(e) { return !e.matched; }).length;
    countEl.textContent = 'Showing ' + filtered.length + ' of ' + configData.length + ' properties' +
        (!showAll && otherCount > 0 ? ' (' + otherCount + ' hidden)' : '') +
        (filtered.length > 20 ? ' — scroll down' : '');
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" class="empty">No matching properties</td></tr>';
        return;
    }
    tbody.innerHTML = filtered.map(function(e) {
        return '<tr><td class="config-key">' + esc(e.key) + '</td>' +
               '<td class="config-val">' + esc(e.value) + '</td></tr>';
    }).join('');
}

function renderMetrics(data) {
    var grid = document.getElementById('metrics-grid');
    var jvm = data.jvm || {};
    var gc = data.gc || {};

    var heapUsed = parseFloat(jvm.heapUsedMb) || 0;
    var heapMax = parseFloat(jvm.heapMaxMb) || 1;
    var heapPct = Math.round((heapUsed / heapMax) * 100);
    var heapColor = heapPct > 80 ? 'var(--red)' : (heapPct > 60 ? 'var(--yellow)' : 'var(--green)');

    var upSec = parseFloat(jvm.uptimeSeconds) || 0;
    var upMin = Math.floor(upSec / 60);
    var upHrs = Math.floor(upMin / 60);
    var uptime = upHrs > 0 ? upHrs + 'h ' + (upMin % 60) + 'm' : upMin + 'm ' + Math.floor(upSec % 60) + 's';

    var cpuCard = '<div class="card"><h2>CPU &amp; Runtime</h2>' +
        m('Processors', jvm.cpuAvailable) +
        m('CPU Load', (parseFloat(jvm.cpuLoad) * 100).toFixed(1) + '%') +
        m('System Load', parseFloat(jvm.systemLoad).toFixed(2)) +
        m('Uptime', uptime) +
        '</div>';

    var memCard = '<div class="card"><h2>Memory</h2>' +
        m('Heap Used', heapUsed.toFixed(1) + ' MB') +
        m('Heap Max', heapMax.toFixed(1) + ' MB') +
        '<div class="progress-bar"><div class="progress-fill" style="width:' + heapPct + '%;background:' + heapColor + '"></div></div>' +
        m('Heap %', heapPct + '%') +
        m('Non-Heap', (jvm.nonHeapUsedMb || 'n/a') + ' MB') +
        '</div>';

    var threadCard = '<div class="card"><h2>Threads &amp; Classes</h2>' +
        m('Threads', jvm.threadCount) +
        m('Daemon', jvm.threadDaemon) +
        m('Peak', jvm.threadPeak) +
        m('Classes Loaded', jvm.classesLoaded) +
        m('Classes Unloaded', jvm.classesUnloaded) +
        '</div>';

    grid.innerHTML = cpuCard + memCard + threadCard;

    if (Object.keys(gc).length > 0) {
        var gcHtml = '<div class="card full-width"><h2>Garbage Collection</h2>';
        for (var k in gc) { gcHtml += m(k, gc[k]); }
        gcHtml += '</div>';
        grid.innerHTML += gcHtml;
    }
}

function m(label, value) {
    return '<div class="metric"><span class="metric-label">' + esc(label) +
           '</span><span class="metric-value">' + esc(String(value || 'n/a')) + '</span></div>';
}

function refresh() {
    document.getElementById('ts').textContent = 'Updated: ' + new Date().toLocaleTimeString();

    fetch(apiUrl('health'))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            healthChecks = data.checks || [];
            renderCategoryTabs();
            renderHealth();
        })
        .catch(function() {
            document.getElementById('health-grid').innerHTML =
                '<div class="card full-width"><div class="empty">Failed to load health data</div></div>';
        });

    fetch(apiUrl('metrics'))
        .then(function(r) { return r.json(); })
        .then(function(data) { renderMetrics(data); })
        .catch(function() {
            document.getElementById('metrics-grid').innerHTML =
                '<div class="card full-width"><div class="empty">Failed to load metrics</div></div>';
        });

    fetch(apiUrl('config'))
        .then(function(r) { return r.json(); })
        .then(function(data) { renderConfig(data.entries); })
        .catch(function() {
            document.getElementById('config-body').innerHTML =
                '<tr><td colspan="2" class="empty">Failed to load</td></tr>';
        });
}

function toggleTheme() {
    document.body.classList.toggle('light');
    localStorage.setItem('dashboard-theme', document.body.classList.contains('light') ? 'light' : 'dark');
}

if (localStorage.getItem('dashboard-theme') === 'light') {
    document.body.classList.add('light');
}

refresh();

// --- Sparkline charts (pure CSS, no library) ---
var MAX_POINTS = 180;
var metricsHistory = { time: [], cpu: [], heapUsed: [], heapMax: [], threads: [] };

function renderSparkline(containerId, labelId, data, maxVal, color, unit) {
    var container = document.getElementById(containerId);
    var label = document.getElementById(labelId);
    if (!container) return;
    var max = maxVal || Math.max.apply(null, data.concat([1]));
    var html = '';
    for (var i = 0; i < data.length; i++) {
        var pct = Math.min((data[i] / max) * 100, 100);
        var cls = 'spark-bar';
        if (color === 'cpu') {
            cls += pct > 80 ? ' crit' : (pct > 60 ? ' warn' : '');
        } else if (color === 'heap') {
            cls += pct > 85 ? ' crit' : (pct > 70 ? ' warn' : '');
        }
        html += '<div class="' + cls + '" style="height:' + Math.max(pct, 1) + '%" title="' +
            metricsHistory.time[i] + ': ' + data[i] + (unit || '') + '"></div>';
    }
    container.innerHTML = html;
    if (data.length > 0) {
        var latest = data[data.length - 1];
        var oldest = metricsHistory.time[0] || '';
        var newest = metricsHistory.time[metricsHistory.time.length - 1] || '';
        label.innerHTML = '<span>' + oldest + '</span><span>Latest: <b>' + latest + (unit || '') + '</b></span><span>' + newest + '</span>';
    }
}

function updateSparklines() {
    renderSparkline('chart-cpu', 'label-cpu', metricsHistory.cpu, 100, 'cpu', '%');
    var heapMax = metricsHistory.heapMax.length > 0 ? metricsHistory.heapMax[metricsHistory.heapMax.length - 1] : 512;
    renderSparkline('chart-heap', 'label-heap', metricsHistory.heapUsed, heapMax, 'heap', ' MB');
    renderSparkline('chart-threads', 'label-threads', metricsHistory.threads, null, 'threads', '');
}

function pollMetrics() {
    fetch(apiUrl('metrics'))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var jvm = data.jvm || {};
            var now = new Date().toLocaleTimeString();

            metricsHistory.time.push(now);
            metricsHistory.cpu.push(Math.round((parseFloat(jvm.cpuLoad) || 0) * 1000) / 10);
            metricsHistory.heapUsed.push(Math.round(parseFloat(jvm.heapUsedMb) || 0));
            metricsHistory.heapMax.push(Math.round(parseFloat(jvm.heapMaxMb) || 0));
            metricsHistory.threads.push(Math.round(parseFloat(jvm.threadCount) || 0));

            if (metricsHistory.time.length > MAX_POINTS) {
                metricsHistory.time.shift();
                metricsHistory.cpu.shift();
                metricsHistory.heapUsed.shift();
                metricsHistory.heapMax.shift();
                metricsHistory.threads.shift();
            }

            updateSparklines();
            renderMetrics(data);
        })
        .catch(function() {});
}

pollMetrics();
setInterval(pollMetrics, 10000);
</script>
</body>
</html>
